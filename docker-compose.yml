services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - FALKORDB_GRAPH_NAME=redthread
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - APP_DEBUG=false
      - APP_LOG_LEVEL=info
      - SQLITE_DB_PATH=/app/data/redthread.db
      - SEED_DATA=${SEED_DATA:-true}
    volumes:
      - app_data:/app/data
    depends_on:
      falkordb:
        condition: service_healthy

volumes:
  falkordb_data:
  app_data:
